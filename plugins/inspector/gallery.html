<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>data-anim Gallery</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #0a0a1f;
      color: #e4e4e7;
      min-height: 100vh;
      padding: 40px 24px;
    }

    h1 {
      text-align: center;
      font-size: 28px;
      font-weight: 700;
      margin-bottom: 8px;
      background: linear-gradient(135deg, #818cf8, #c084fc, #f472b6);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .subtitle {
      text-align: center;
      color: #71717a;
      font-size: 14px;
      margin-bottom: 40px;
    }

    .category {
      max-width: 1200px;
      margin: 0 auto 32px;
    }

    .category-title {
      font-size: 13px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 1px;
      color: #a1a1aa;
      margin-bottom: 12px;
      padding-left: 4px;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
      gap: 12px;
    }

    .card {
      background: #13132b;
      border: 1px solid #1e1e3a;
      border-radius: 12px;
      padding: 16px;
      cursor: pointer;
      transition: border-color 0.2s, background 0.2s;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 12px;
      min-height: 120px;
    }

    .card:hover {
      border-color: #818cf8;
      background: #1a1a38;
    }

    .card-preview {
      width: 48px;
      height: 48px;
      border-radius: 10px;
      background: linear-gradient(135deg, #818cf8, #c084fc);
      flex-shrink: 0;
    }

    .card-name {
      font-size: 12px;
      font-family: 'SF Mono', 'Fira Code', monospace;
      color: #c084fc;
      text-align: center;
      word-break: break-all;
    }

    .play-all-bar {
      max-width: 1200px;
      margin: 0 auto 32px;
      display: flex;
      gap: 12px;
      align-items: center;
    }

    .play-all-btn {
      padding: 8px 20px;
      border: 1px solid #818cf8;
      border-radius: 8px;
      background: transparent;
      color: #818cf8;
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      transition: background 0.2s;
      font-family: inherit;
    }

    .play-all-btn:hover {
      background: rgba(129, 140, 248, 0.1);
    }

    .controls {
      display: flex;
      gap: 12px;
      align-items: center;
    }

    .controls label {
      font-size: 12px;
      color: #71717a;
    }

    .controls select {
      padding: 6px 10px;
      border: 1px solid #1e1e3a;
      border-radius: 6px;
      background: #13132b;
      color: #e4e4e7;
      font-size: 12px;
      font-family: inherit;
    }
  </style>
</head>
<body>
  <h1>data-anim Gallery</h1>
  <p class="subtitle">Click a card to preview the animation. Click "Play All" to see them all at once.</p>

  <div class="play-all-bar">
    <button class="play-all-btn" id="playAll">Play All</button>
    <div class="controls">
      <label>Duration</label>
      <select id="duration">
        <option value="400ms">400ms</option>
        <option value="600ms">600ms</option>
        <option value="800ms" selected>800ms</option>
        <option value="1000ms">1000ms</option>
        <option value="1200ms">1200ms</option>
      </select>
      <label>Easing</label>
      <select id="easing">
        <option value="cubic-bezier(0.25,0.1,0.25,1)">ease</option>
        <option value="cubic-bezier(0.16,1,0.3,1)">ease-out-expo</option>
        <option value="cubic-bezier(0.34,1.56,0.64,1)">ease-out-back</option>
        <option value="cubic-bezier(0.175,0.885,0.32,1.275)">spring</option>
      </select>
    </div>
  </div>

  <div id="gallery"></div>

  <script>
    const D = '--da-distance,30px';
    const O_T = 'to{opacity:1;transform:none}';

    const categories = [
      {
        label: 'Fade',
        anims: [
          { name: 'fadeIn', kf: `@keyframes da-fadeIn{from{opacity:0;transform:scale(.95)}to{opacity:1;transform:none}}` },
          { name: 'fadeOut', kf: `@keyframes da-fadeOut{from{opacity:1}to{opacity:0}}` },
          { name: 'fadeInUp', kf: `@keyframes da-fadeInUp{from{opacity:0;transform:translateY(var(${D}))}${O_T}}` },
          { name: 'fadeInDown', kf: `@keyframes da-fadeInDown{from{opacity:0;transform:translateY(calc(var(${D})*-1))}${O_T}}` },
          { name: 'fadeInLeft', kf: `@keyframes da-fadeInLeft{from{opacity:0;transform:translateX(calc(var(${D})*-1))}${O_T}}` },
          { name: 'fadeInRight', kf: `@keyframes da-fadeInRight{from{opacity:0;transform:translateX(var(${D}))}${O_T}}` },
        ]
      },
      {
        label: 'Slide',
        anims: [
          { name: 'slideInUp', kf: `@keyframes da-slideInUp{from{opacity:0;transform:translateY(100%)}${O_T}}` },
          { name: 'slideInDown', kf: `@keyframes da-slideInDown{from{opacity:0;transform:translateY(-100%)}${O_T}}` },
          { name: 'slideInLeft', kf: `@keyframes da-slideInLeft{from{opacity:0;transform:translateX(-100%)}${O_T}}` },
          { name: 'slideInRight', kf: `@keyframes da-slideInRight{from{opacity:0;transform:translateX(100%)}${O_T}}` },
        ]
      },
      {
        label: 'Zoom',
        anims: [
          { name: 'zoomIn', kf: `@keyframes da-zoomIn{from{opacity:0;transform:scale(.5)}${O_T}}` },
          { name: 'zoomOut', kf: `@keyframes da-zoomOut{from{opacity:0;transform:scale(1.5)}${O_T}}` },
          { name: 'zoomInUp', kf: `@keyframes da-zoomInUp{from{opacity:0;transform:scale(.9) translateY(var(${D}))}${O_T}}` },
          { name: 'zoomInDown', kf: `@keyframes da-zoomInDown{from{opacity:0;transform:scale(.9) translateY(calc(var(${D})*-1))}${O_T}}` },
        ]
      },
      {
        label: 'Bounce',
        anims: [
          { name: 'bounce', kf: `@keyframes da-bounce{0%,20%,53%,to{transform:none}40%{transform:translateY(-20px)}70%{transform:translateY(-10px)}}` },
          { name: 'bounceIn', kf: `@keyframes da-bounceIn{0%{opacity:0;transform:scale(.3)}50%{transform:scale(1.05)}70%{transform:scale(.9)}${O_T}}` },
          { name: 'bounceInUp', kf: `@keyframes da-bounceInUp{0%{opacity:0;transform:translateY(50px)}60%{opacity:1;transform:translateY(-10px)}80%{transform:translateY(5px)}to{transform:none}}` },
          { name: 'bounceInDown', kf: `@keyframes da-bounceInDown{0%{opacity:0;transform:translateY(-50px)}60%{opacity:1;transform:translateY(10px)}80%{transform:translateY(-5px)}to{transform:none}}` },
        ]
      },
      {
        label: 'Attention',
        anims: [
          { name: 'shake', kf: `@keyframes da-shake{0%,to{transform:none}10%,30%,50%,70%,90%{transform:translateX(-10px)}20%,40%,60%,80%{transform:translateX(10px)}}` },
          { name: 'pulse', kf: `@keyframes da-pulse{0%,to{transform:scale(1)}50%{transform:scale(1.15)}}` },
          { name: 'wobble', kf: `@keyframes da-wobble{0%,to{transform:none}15%{transform:translateX(-15px) rotate(-5deg)}30%{transform:translateX(10px) rotate(3deg)}45%{transform:translateX(-5px) rotate(-2deg)}}` },
          { name: 'flip', kf: `@keyframes da-flip{from{transform:perspective(400px) rotateY(0)}to{transform:perspective(400px) rotateY(360deg)}}` },
          { name: 'swing', kf: `@keyframes da-swing{0%,to{transform:none}20%{transform:rotate(15deg)}40%{transform:rotate(-10deg)}60%{transform:rotate(5deg)}80%{transform:rotate(-5deg)}}` },
          { name: 'rubberBand', kf: `@keyframes da-rubberBand{0%,to{transform:scale(1)}30%{transform:scale(1.25,.75)}40%{transform:scale(.75,1.25)}50%{transform:scale(1.15,.85)}65%{transform:scale(.95,1.05)}75%{transform:scale(1.05,.95)}}` },
        ]
      },
      {
        label: 'Rotate',
        anims: [
          { name: 'rotateIn', kf: `@keyframes da-rotateIn{from{opacity:0;transform:rotate(-200deg)}${O_T}}` },
          { name: 'rotateInDownLeft', kf: `@keyframes da-rotateInDownLeft{from{opacity:0;transform:rotate(-90deg)}${O_T}}` },
          { name: 'rotateInDownRight', kf: `@keyframes da-rotateInDownRight{from{opacity:0;transform:rotate(90deg)}${O_T}}` },
        ]
      },
      {
        label: 'Special',
        anims: [
          { name: 'blur', kf: `@keyframes da-blur{from{opacity:0;filter:blur(10px)}to{opacity:1;filter:blur(0)}}` },
          { name: 'clipReveal', kf: `@keyframes da-clipReveal{from{clip-path:inset(0 100% 0 0)}to{clip-path:inset(0)}}` },
          { name: 'typewriter', kf: `@keyframes da-typewriter{from{max-width:0}to{max-width:100%}}` },
        ]
      },
    ];

    // Inject all keyframes
    const styleEl = document.createElement('style');
    styleEl.textContent = categories.flatMap(c => c.anims.map(a => a.kf)).join('\n');
    document.head.appendChild(styleEl);

    const gallery = document.getElementById('gallery');
    const durationSel = document.getElementById('duration');
    const easingSel = document.getElementById('easing');

    function getDuration() { return durationSel.value; }
    function getEasing() { return easingSel.value; }

    function playAnim(el, animName) {
      el.style.animation = 'none';
      el.offsetWidth; // reflow
      el.style.animation = `da-${animName} ${getDuration()} ${getEasing()} 0s 1 both`;
    }

    // Build gallery
    for (const cat of categories) {
      const section = document.createElement('div');
      section.className = 'category';
      section.innerHTML = `<div class="category-title">${cat.label}</div>`;

      const grid = document.createElement('div');
      grid.className = 'grid';

      for (const anim of cat.anims) {
        const card = document.createElement('div');
        card.className = 'card';

        const preview = document.createElement('div');
        preview.className = 'card-preview';

        const name = document.createElement('div');
        name.className = 'card-name';
        name.textContent = anim.name;

        card.appendChild(preview);
        card.appendChild(name);

        card.addEventListener('click', () => {
          playAnim(preview, anim.name);
        });

        grid.appendChild(card);
      }

      section.appendChild(grid);
      gallery.appendChild(section);
    }

    // Play All
    document.getElementById('playAll').addEventListener('click', () => {
      const previews = document.querySelectorAll('.card');
      previews.forEach((card, i) => {
        const preview = card.querySelector('.card-preview');
        const animName = card.querySelector('.card-name').textContent;
        setTimeout(() => playAnim(preview, animName), i * 80);
      });
    });
  </script>
</body>
</html>
